schema_version: 1

context:
  name: dxcam
  version: "0.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dxcam-${{ version }}.tar.gz
  sha256: d524da45adf70e044865e7d4e9098e655d6734951781155dda50c1292e20d8bd

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - opencv
    - comtypes
    - __win

tests:
  - python:
      imports:
        - dxcam
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A Python high-performance screenshot library for Windows use Desktop Duplication API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/ra1nty/DXcam
  repository: https://github.com/ra1nty/DXcam

extra:
  recipe-maintainers:
    - jan-janssen
